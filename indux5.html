<!DOCTYPE html>
<html>
<head>
  <title>onchange Example</title>
</head>
<body>
    <div>
    <h1="name" onmouseover="ch()" onmouseout="kh()">EXPETRO PATRONAAMMMM</h1>
    </div>
<script>
function ch() {
    document.body.style.color='red';
}
function kh()
{
    document.body.style.color='black';
}
</script>
</body>
</html>
